# ── Featured: self-developed, deployed builds ──────────────────────────────
- title: "Teamora — Student Team-Formation Web App"
  category: featured
  badge: "Featured · Live App"
  blurb: >
    A live web app that helps instructors form balanced student teams from a quick
    survey. It grew out of my Birds of a Feather research — four matching models
    (Hungarian assignment as the optimized default), a six-metric team-quality score,
    and a privacy-first design that processes data in memory only.
  tags: [Python, Streamlit, scikit-learn, scipy]
  thumbnail: /assets/images/teamora.png
  live: https://teamora.streamlit.app
  live_label: "Live demo ↗"
  code: https://github.com/HPAuncc/teammate-matcher-app

- title: "Credit-Risk Default Prediction — Loan-Default Model & Dashboard"
  category: featured
  badge: "Featured · Live Dashboard"
  blurb: >
    A normalized SQL database of 1.35M consumer loans, with scikit-learn models that
    flag loan default at 0.716 ROC-AUC and an interactive Tableau dashboard of the
    risk segments — including a borrower-only model that edges out the lender's own
    credit grades.
  tags: [SQL, Python, scikit-learn, Tableau]
  thumbnail: /assets/images/credit-risk.jpg
  live: https://public.tableau.com/app/profile/hampton.abbott/viz/Credit-RiskDefaultPrediction/Overview
  live_label: "Live dashboard ↗"
  code: https://github.com/HPAuncc/credit-risk-analysis

