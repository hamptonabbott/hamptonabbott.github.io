<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {%- seo -%}
  {%- if page.layout == 'post' %}
  <meta name="author" content="Hampton Abbott">
  <meta property="article:author" content="Hampton Abbott">
  {%- endif %}

  <link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}" />
  <link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Tailwind (chrome + utilities, incl. Preflight) first; minima main.css after for long-form prose. -->
  <link rel="stylesheet" href="{{ '/assets/tailwind.css' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}" />
  <!-- minima's body font shorthand loads last; re-pin Inter to match the homepage -->
  <style>body{font-family:'Inter',system-ui,sans-serif}</style>

  {%- feed_meta -%}
</head>
