theme: minima
title: Personal Portfolio
description: Portfolio | 2026
url: "https://hamptonabbott.com"
# Extension-less canonical URLs (e.g. /projects/home-field-advantage/) so links,
# canonical tags, and jekyll-seo-tag og:url all match.
permalink: pretty
twitter:
  card: summary_large_image
# Default social-preview image applied to every page so jekyll-seo-tag
# (which reads page.image, not site.image) emits og:image site-wide.
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/og-preview.png
# Nav is rendered by the local _includes/header.html (hardcoded links),
# so minima's header_pages loop is no longer used.

# Tailwind build sources (not part of the published site; assets/tailwind.css is the compiled output)
exclude:
  - tailwind.config.js
  - tailwind.src.css
  - node_modules
  - package.json
  - package-lock.json
